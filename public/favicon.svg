<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Pixel Art Logo - Chat Bubble -->
  <rect width="32" height="32" fill="#16213e"/>
  <!-- Chat bubble body -->
  <rect x="4" y="4" width="24" height="18" fill="#5865f2"/>
  <rect x="6" y="6" width="20" height="14" fill="#5865f2"/>
  <!-- Chat bubble dots -->
  <rect x="8" y="10" width="4" height="4" fill="#ffffff"/>
  <rect x="14" y="10" width="4" height="4" fill="#ffffff"/>
  <rect x="20" y="10" width="4" height="4" fill="#ffffff"/>
  <!-- Chat bubble tail -->
  <rect x="4" y="22" width="8" height="4" fill="#5865f2"/>
  <rect x="4" y="20" width="4" height="2" fill="#5865f2"/>
  <!-- Accent colors -->
  <rect x="8" y="10" width="2" height="2" fill="#00d9ff"/>
  <rect x="14" y="10" width="2" height="2" fill="#e94560"/>
  <rect x="20" y="10" width="2" height="2" fill="#39ff14"/>
</svg>
